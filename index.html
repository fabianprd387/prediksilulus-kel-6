<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Prediksi Kelulusan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 2rem 0;
        }
        .main-card {
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem !important;
        }
        .icon-header {
            background: linear-gradient(135deg, #2563eb, #8ec5fc);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .form-floating > label {
            color: #6b7280;
            font-weight: 500;
        }
        .form-select {
            border-radius: 12px;
            border: 1.5px solid #e5e7eb;
            height: calc(3.5rem + 2px);
            background-color: #f9fafb;
        }
        .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background-color: #ffffff;
        }
        .btn-predict {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-radius: 12px;
            font-weight: 600;
            padding: 1rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border: none;
        }
        .btn-predict:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
        }
        .result-box {
            font-size: 1.2rem;
            font-weight: 700;
            text-align: center;
            border-radius: 12px;
            display: none;
            border: none;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 576px) {
            .main-card {
                padding: 1.5rem !important;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="card main-card">
                    <div class="icon-header">
                        <i class="bi bi-mortarboard-fill"></i>
                    </div>
                    <h3 class="text-center fw-bold mb-1 text-dark">Prediksi Kelulusan</h3>
                    <p class="text-center text-secondary mb-4 small">Machine Learning Decision Tree</p>

                    <div id="hasil-box" class="alert result-box mb-4" role="alert"></div>

                    <form id="prediksiForm">
                        <div class="form-floating mb-3">
                            <select class="form-select" id="sks" required>
                                <option value="kurang dari 18">Kurang dari 18 SKS</option>
                                <option value="18-20" selected>18 - 20 SKS</option>
                                <option value="lebih dari 20">Lebih dari 20 SKS</option>
                            </select>
                            <label><i class="bi bi-journal-check me-2"></i>Rata-rata SKS / Semester</label>
                        </div>

                        <div class="form-floating mb-3">
                            <select class="form-select" id="mengulang" required>
                                <option value="Tidak" selected>Tidak Pernah</option>
                                <option value="Ya">Pernah</option>
                            </select>
                            <label><i class="bi bi-arrow-repeat me-2"></i>Riwayat Mengulang Matkul</label>
                        </div>

                        <div class="form-floating mb-3">
                            <select class="form-select" id="kehadiran" required>
                                <option value="Rendah">Rendah</option>
                                <option value="Sedang">Sedang</option>
                                <option value="Tinggi" selected>Tinggi</option>
                            </select>
                            <label><i class="bi bi-person-check me-2"></i>Tingkat Kehadiran Kelas</label>
                        </div>

                        <div class="form-floating mb-3">
                            <select class="form-select" id="organisasi" required>
                                <option value="Tidak" selected>Tidak Aktif</option>
                                <option value="Ya">Aktif</option>
                            </select>
                            <label><i class="bi bi-people me-2"></i>Aktivitas Organisasi Kampus</label>
                        </div>

                        <div class="form-floating mb-4">
                            <select class="form-select" id="waktu" required>
                                <option value="< 1 jam">< 1 jam</option>
                                <option value="1-2 jam" selected>1 - 2 jam</option>
                                <option value="> 2 jam">> 2 jam</option>
                            </select>
                            <label><i class="bi bi-clock-history me-2"></i>Waktu Belajar per Hari</label>
                        </div>

                        <button type="submit" class="btn btn-predict w-100 text-white mt-2">
                            <i class="bi bi-magic me-2"></i>Mulai Prediksi
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('prediksiForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let sks_text = document.getElementById('sks').value;
            let sks_val = (sks_text === 'kurang dari 18') ? 1 : (sks_text === '18-20') ? 2 : 3;

            let mengulang_text = document.getElementById('mengulang').value;
            let mengulang_val = (mengulang_text === 'Ya') ? 1 : 0;

            let kehadiran_text = document.getElementById('kehadiran').value;
            let kehadiran_val = (kehadiran_text === 'Rendah') ? 1 : (kehadiran_text === 'Sedang') ? 2 : 3;

            let waktu_text = document.getElementById('waktu').value;
            let waktu_val = (waktu_text === '< 1 jam') ? 1 : (waktu_text === '1-2 jam') ? 2 : 3;

            let organisasi_text = document.getElementById('organisasi').value;
            let organisasi_val = (organisasi_text === 'Ya') ? 1 : 0;

            let prediksi = 0;

            if (mengulang_val === 0) {
                if (sks_val === 1) {
                    prediksi = 0;
                } else {
                    if (kehadiran_val <= 2) {
                        if (kehadiran_val === 1) {
                            prediksi = 0;
                        } else {
                            if (sks_val === 2) {
                                if (waktu_val === 1) {
                                    prediksi = 0;
                                } else if (waktu_val === 2) {
                                    prediksi = 1;
                                } else {
                                    if (organisasi_val === 0) {
                                        prediksi = 0;
                                    } else {
                                        prediksi = 1;
                                    }
                                }
                            } else {
                                prediksi = 1;
                            }
                        }
                    } else {
                        prediksi = 1;
                    }
                }
            } else {
                if (kehadiran_val <= 2) {
                    if (waktu_val <= 2) {
                        prediksi = 0;
                    } else {
                        if (kehadiran_val === 1) {
                            prediksi = 0;
                        } else {
                            prediksi = 1;
                        }
                    }
                } else {
                    if (sks_val === 1) {
                        prediksi = 0;
                    } else {
                        if (waktu_val === 1) {
                            if (organisasi_val === 0) {
                                prediksi = 0;
                            } else {
                                prediksi = 1;
                            }
                        } else {
                            prediksi = 1;
                        }
                    }
                }
            }

            let hasilBox = document.getElementById('hasil-box');
            hasilBox.style.display = 'block';
            hasilBox.className = 'alert result-box mb-4 shadow-sm';

            if (prediksi === 1) {
                hasilBox.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>LULUS TEPAT WAKTU';
                hasilBox.classList.add('alert-success');
                hasilBox.style.backgroundColor = '#dcfce7';
                hasilBox.style.color = '#166534';
            } else {
                hasilBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i>LULUS TERLAMBAT';
                hasilBox.classList.add('alert-danger');
                hasilBox.style.backgroundColor = '#fee2e2';
                hasilBox.style.color = '#991b1b';
            }
        });
    </script>
</body>
</html>
